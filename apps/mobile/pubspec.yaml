name: vkc_mobile
description: A new Flutter project for the Vishwakarma Knowledge Centre.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.1
  pretty_dio_logger: ^1.3.1

  # Service Locator / DI
  get_it: ^7.6.7
  injectable: ^2.4.1

  # Navigation
  go_router: ^13.2.0

  # Persistence
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Functional / Utils
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.8
  injectable_generator: ^2.6.1
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
